services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: loseme-server:latest
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - LOSEME_DEVICE_ID=${LOSEME_DEVICE_ID}
      - LOSEME_EMBEDDING_MODEL=${LOSEME_EMBEDDING_MODEL}
      - LOSEME_CHUNKER=${LOSEME_CHUNKER}
      - LOSEME_VECTOR_STORAGE=${LOSEME_VECTOR_STORAGE}
      - LOSEME_USE_CUDA=${LOSEME_USE_CUDA}
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
    volumes:
      - metadata:/var/lib/loseme/metadata
      - hf_cache:/root/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: loseme-client:latest
    ports:
      - "3000:3000"
    environment:
      - LOSEME_API_URL=http://server:8000
      - LOSEME_PUBLIC_API_URL=http://localhost:8000
      - LOSEME_DEVICE_ID=${LOSEME_DEVICE_ID}
      - LOSEME_HOST_ROOT=${LOSEME_HOST_ROOT}
      - LOSEME_CONTAINER_ROOT=/mnt/userdata
    volumes:
      - ${LOSEME_HOST_ROOT}:/mnt/userdata

volumes:
  qdrant_data:
    external: true
    name: loseme_qdrant_data
  metadata:
    external: true
    name: loseme_metadata
  hf_cache:
    external: true
    name: loseme_hf_cache
