[pytest]
# pytest.ini lives at repo root.
# Run from repo root: PYTHONPATH=server:client:core pytest
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for selective runs
markers =
    unit: Pure unit tests (no I/O, no network)
    integration: Integration tests (TestClient, in-memory DB)
    slow: Tests that take more than a few seconds

# Output — no --cov here; pass coverage flags on the CLI when needed
addopts =
    -v
    --tb=short
    --strict-markers

# Suppress noisy deprecation warnings from third-party libs
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
