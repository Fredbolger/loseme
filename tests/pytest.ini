[pytest]
# Run from repo root: PYTHONPATH=server:client:core pytest tests/
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for selective runs
markers =
    unit: Pure unit tests (no I/O, no network)
    integration: Integration tests (TestClient, in-memory DB)
    slow: Tests that take more than a few seconds

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Ignore heavy optional modules that aren't installed in CI
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
