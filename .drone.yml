kind: pipeline
type: docker
name: loseme-tests

volumes:
  - name: venv
    temp: {}

  # Needed for Docker builds
  - name: dockersock
    host:
      path: /var/run/docker.sock

platform:
  os: linux
  arch: arm64

clone:
  depth: 1

# ── Shared env block (YAML anchor) ─────────────────────────────────────────
x-env: &env
  PYTHONPATH: server:client:core
  LOSEME_HOST_ROOT: /host/data
  LOSEME_CONTAINER_ROOT: /mnt/data
  LOSEME_DEVICE_ID: ci-runner
  LOSEME_EMBEDDING_MODEL: sentence-transformer:all-MiniLM-L6-v2
  LOSEME_CHUNKER: simple
  LOSEME_VECTOR_STORAGE: in-memory
  QDRANT_URL: http://localhost:9999

steps:

  - name: build-test-image
    image: python:3.11-slim
    volumes:
      - name: venv
        path: /venv
    environment:
      <<: *env
    commands:
      - apt-get update -qq && apt-get install -y --no-install-recommends build-essential -qq
      - python -m venv /venv
      - . /venv/bin/activate
      - pip install --upgrade pip
      - pip install --no-cache-dir --prefer-binary -e ./core
      - pip install --no-cache-dir --prefer-binary fastapi uvicorn[standard] pydantic>=2.0 httpx qdrant-client sentence-transformers pypdf bs4 lxml typer
      - pip install --no-cache-dir --prefer-binary -e ./client
      - pip install --no-cache-dir --prefer-binary pytest pytest-cov pyflakes

  - name: lint
    image: python:3.11-slim
    depends_on: [build-test-image]
    volumes:
      - name: venv
        path: /venv
    environment:
      <<: *env
    commands:
      - . /venv/bin/activate
      - python -m pyflakes server/api server/pipeline server/storage core/loseme_core client/extractors client/sources || true

  - name: unit-tests
    image: python:3.11-slim
    environment:
      <<: *env
    depends_on: [build-test-image]
    volumes:
      - name: venv
        path: /venv
    commands:
      - . /venv/bin/activate
      - chmod +x run_tests.sh
      - ./run_tests.sh unit

  - name: integration-tests
    image: python:3.11-slim
    depends_on: [unit-tests]
    volumes:
      - name: venv
        path: /venv
    environment:
      <<: *env
    commands:
      - . /venv/bin/activate
      - python -m pytest tests/test_api_integration.py tests/test_ingest_skip_logic.py -v --tb=short -x

  - name: coverage-report
    image: python:3.11-slim
    depends_on: [integration-tests]
    volumes:
      - name: venv
        path: /venv
    environment:
      <<: *env
    when:
      status: [success, failure]
    commands:
      - /venv/bin/python -m pytest tests/ --cov --cov-report=xml:coverage.xml --cov-report=term -q || true

  - name: publish-server-image
    image: docker:24
    depends_on: [integration-tests]
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
    environment:
      GITEA_USERNAME:
        from_secret: gitea_username
      GITEA_TOKEN:
        from_secret: gitea_token
    commands:
      - export REGISTRY=gitea.example.com
      - export IMAGE=$REGISTRY/ben/loseme-server
      - export TAG=${DRONE_COMMIT_SHA:0:8}
      - echo "$GITEA_TOKEN" | docker login $REGISTRY -u "$GITEA_USERNAME" --password-stdin
      - docker build -f Dockerfile.server -t $IMAGE:$TAG .
      - docker tag $IMAGE:$TAG $IMAGE:${DRONE_BRANCH}
      - docker push $IMAGE:$TAG
      - docker push $IMAGE:${DRONE_BRANCH}
      - |
        if [ "$DRONE_BRANCH" = "main" ]; then
          docker tag $IMAGE:$TAG $IMAGE:latest
          docker push $IMAGE:latest
        fi

  - name: publish-client-image
    image: docker:24
    depends_on: [integration-tests]
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
    environment:
      GITEA_USERNAME:
        from_secret: gitea_username
      GITEA_TOKEN:
        from_secret: gitea_token
    commands:
      - export REGISTRY=gitea.benheuser.de
      - export IMAGE=$REGISTRY/ben/loseme-client
      - export TAG=${DRONE_COMMIT_SHA:0:8}
      - echo "$GITEA_TOKEN" | docker login $REGISTRY -u "$GITEA_USERNAME" --password-stdin
      - docker build -f Dockerfile.client -t $IMAGE:$TAG .
      - docker tag $IMAGE:$TAG $IMAGE:${DRONE_BRANCH}
      - docker push $IMAGE:$TAG
      - docker push $IMAGE:${DRONE_BRANCH}
      - |
        if [ "$DRONE_BRANCH" = "main" ]; then
          docker tag $IMAGE:$TAG $IMAGE:latest
          docker push $IMAGE:latest
        fi

trigger:
  branch:
    - main
    - master
    - develop
    - working-tests
  event:
    - push
    - pull_request
